[Rainmeter]
Update=1000
DynamicWindowSize=1
@include=#@#themes\current.inc

[Metadata]
Name=DiskUsage
Author=Jeffrey Earl
Information=Disk usage and I/O monitor

[Variables]
; Machine-specific — update these per machine
hdd.driveletter="C:"
hdd.label="Drive C"

;===========================================
;  Measures
;===========================================

[MeasureAccess]
Measure=Plugin
Plugin=PerfMon
PerfMonObject=LogicalDisk
PerfMonCounter="Disk Bytes/sec"
PerfMonInstance=#hdd.driveletter#

[MeasureFree]
Measure=FreeDiskSpace
Drive=#hdd.driveletter#

[MeasureUsed]
Measure=FreeDiskSpace
Drive=#hdd.driveletter#
InvertMeasure=1

[MeasureSize]
Measure=FreeDiskSpace
Drive=#hdd.driveletter#
Total=1

;===========================================
;  Display
;===========================================

[Disk.Label]
Meter=STRING
X=5
Y=0
FontColor=#fontColor.Label#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
Text=#hdd.label#

[Disk.Bar]
Meter=Bar
MeasureName=MeasureUsed
X=5
Y=17r
W=200
H=13
BarColor=#graph.fill#
BarOrientation=HORIZONTAL

[DiskIO.Fill]
Meter=HISTOGRAM
MeasureName=MeasureAccess
X=5
Y=15
H=37
W=200
PrimaryColor=#graph.fill#
AutoScale=1
AntiAlias=1

[DiskIO.Line]
Meter=Line
MeasureName=MeasureAccess
X=5
Y=14
H=38
W=200
LineCount=1
LineColor=#graph.line#
AutoScale=1
AntiAlias=1

[Disk.Used]
Meter=STRING
MeasureName=MeasureUsed
X=5
Y=2r
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
AutoScale=1
NumOfDecimals=1

[Disk.Free]
Meter=STRING
MeasureName=MeasureFree
X=200
Y=0r
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
StringAlign=Right
AntiAlias=1
AutoScale=1
NumOfDecimals=1

[DiskIO.Value]
Meter=STRING
MeasureName=MeasureAccess
X=5
Y=14r
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
AutoScale=1
NumOfDecimals=1

[Disk.Total]
Meter=STRING
MeasureName=MeasureSize
X=200
Y=0r
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
StringAlign=Right
AntiAlias=1
AutoScale=1
NumOfDecimals=1
Prefix="cap: "
