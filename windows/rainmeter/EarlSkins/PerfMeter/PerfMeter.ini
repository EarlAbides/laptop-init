[Rainmeter]
Update=1000
DynamicWindowSize=1
@include=#@#themes\current.inc

[Metadata]
Name=PerfMeter
Author=Jeffrey Earl
Information=System performance monitor (CPU, RAM, Swap, Network)

;===========================================
;  Uptime
;===========================================

[MeasureUptime]
Measure=Uptime
Substitute="d":" day(s)",":":"h "

[MeterUptime.Label]
Meter=STRING
X=5
Y=5
FontColor=#fontColor.Label#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
Text="Uptime:"

[MeterUptime]
Meter=STRING
MeasureName=MeasureUptime
X=200r
Y=0r
StringAlign=Right
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
Text="%1min"

;===========================================
;  CPU
;===========================================

[MeasureCPU]
Measure=CPU

[MeasureCPUMHz]
Measure=Plugin
Plugin=PowerPlugin
PowerState=MHZ

[CPUGraph.Fill]
Meter=HISTOGRAM
MeasureName=MeasureCPU
X=5
Y=25r
H=37
W=200
PrimaryColor=#graph.fill#
AntiAlias=1

[CPUGraph.Line]
Meter=Line
MeasureName=MeasureCPU
X=5
Y=0r
H=38
W=200
LineCount=1
LineColor=#graph.line#
AntiAlias=1

[CPU.Label]
Meter=STRING
MeasureName=MeasureCPU
X=5
Y=0r
FontColor=#fontColor.Label#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
NumOfDecimals=1
Text="CPU Load: %1%"

[CPU.MHz]
Meter=STRING
MeasureName=MeasureCPUMHz
X=5
Y=15r
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
Text="%1 MHz"

;===========================================
;  CPU Temperature (requires CoreTemp running)
;===========================================

[MeasureCPUTemp]
Measure=Plugin
Plugin=CoreTemp
CoreTempType=Temperature
CoreTempIndex=0

[CPUTempGraph.Fill]
Meter=HISTOGRAM
MeasureName=MeasureCPUTemp
X=5
Y=25r
H=37
W=200
PrimaryColor=#graph.fill#
AntiAlias=1

[CPUTempGraph.Line]
Meter=Line
MeasureName=MeasureCPUTemp
X=5
Y=0r
H=38
W=200
LineCount=1
LineColor=#graph.line#
AntiAlias=1

[CPUTemp.Label]
Meter=STRING
X=5
Y=0r
FontColor=#fontColor.Label#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
Text="CPU Temp:"

[CPUTemp.Value]
Meter=STRING
MeasureName=MeasureCPUTemp
X=5
Y=15r
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
Text="%1 C"

;===========================================
;  RAM
;===========================================

[MeasureTotalRAM]
Measure=PhysicalMemory
Total=1

[MeasureUsedRAM]
Measure=PhysicalMemory

[MeasureFreeRAM]
Measure=PhysicalMemory
InvertMeasure=1

[RAM.Label]
Meter=STRING
X=5
Y=25r
FontColor=#fontColor.Label#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
Text="Total System RAM:"

[RAM.Total]
Meter=STRING
MeasureName=MeasureTotalRAM
X=110
Y=0r
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
Text="%1b"
AutoScale=1

[RAM.Bar]
Meter=BAR
MeasureName=MeasureUsedRAM
X=5
Y=15r
W=200
H=13
BarColor=#graph.fill#
BarOrientation=HORIZONTAL

[RAM.UsedPct]
Meter=STRING
MeasureName=MeasureUsedRAM
X=5
Y=0r
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
AutoScale=1
NumOfDecimals=2
Percentual=1
PostFix="%"

[RAM.FreePct]
Meter=STRING
MeasureName=MeasureFreeRAM
X=200r
Y=0r
StringAlign=Right
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
AutoScale=1
NumOfDecimals=2
Percentual=1
PostFix="%"

[RAM.Used]
Meter=STRING
MeasureName=MeasureUsedRAM
X=5
Y=15r
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
AutoScale=1
NumOfDecimals=2
PostFix="b"

[RAM.Free]
Meter=STRING
MeasureName=MeasureFreeRAM
X=200r
Y=0r
StringAlign=Right
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
AutoScale=1
NumOfDecimals=2
PostFix="b"

;===========================================
;  Swap
;===========================================

[MeasureTotalSwap]
Measure=SwapMemory
Total=1

[MeasureUsedSwap]
Measure=SwapMemory

[MeasureFreeSwap]
Measure=SwapMemory
InvertMeasure=1

[Swap.Label]
Meter=STRING
X=5
Y=25r
FontColor=#fontColor.Label#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
Text="Total System Swap:"

[Swap.Total]
Meter=STRING
MeasureName=MeasureTotalSwap
X=110
Y=0r
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
Text="%1b"
AutoScale=1

[Swap.Bar]
Meter=BAR
MeasureName=MeasureUsedSwap
X=5
Y=15r
W=200
H=13
BarColor=#graph.fill#
BarOrientation=HORIZONTAL

[Swap.UsedPct]
Meter=STRING
MeasureName=MeasureUsedSwap
X=5
Y=0r
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
AutoScale=1
NumOfDecimals=2
Percentual=1
PostFix="%"

[Swap.FreePct]
Meter=STRING
MeasureName=MeasureFreeSwap
X=200r
Y=0r
StringAlign=Right
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
AutoScale=1
NumOfDecimals=2
Percentual=1
PostFix="%"

[Swap.Used]
Meter=STRING
MeasureName=MeasureUsedSwap
X=5
Y=15r
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
AutoScale=1
NumOfDecimals=2
PostFix="b"

[Swap.Free]
Meter=STRING
MeasureName=MeasureFreeSwap
X=200r
Y=0r
StringAlign=Right
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
AutoScale=1
NumOfDecimals=2
PostFix="b"

;===========================================
;  Network
;===========================================

[TCPIn]
Measure=NetIn

[TCPOut]
Measure=NetOut

[TCPInAll]
Measure=NetIn
Cumulative=1

[TCPOutAll]
Measure=NetOut
Cumulative=1

[Net.Label]
Meter=STRING
X=5
Y=25r
FontColor=#fontColor.Label#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
Text="Network Traffic:"

[NetIn.Fill]
Meter=HISTOGRAM
MeasureName=TCPIn
X=5
Y=15r
H=27
W=95
PrimaryColor=#graph.fill#
AntiAlias=1
AutoScale=1

[NetOut.Fill]
Meter=HISTOGRAM
MeasureName=TCPOut
X=110
Y=0r
H=27
W=95
PrimaryColor=#graph.fill#
AntiAlias=1
AutoScale=1

[NetIn.Line]
Meter=Line
MeasureName=TCPIn
X=5
Y=0r
H=28
W=95
LineCount=1
LineColor=#graph.line#
AntiAlias=1
AutoScale=1

[NetOut.Line]
Meter=Line
MeasureName=TCPOut
X=110
Y=0r
H=28
W=95
LineCount=1
LineColor=#graph.line#
AntiAlias=1
AutoScale=1

[Net.In]
Meter=STRING
MeasureName=TCPIn
X=5
Y=0r
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
AutoScale=1
Text="In: %1B"

[Net.Out]
Meter=STRING
MeasureName=TCPOut
X=110
Y=0r
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
AutoScale=1
Text="Out: %1B"

[Net.TotalIn]
Meter=STRING
MeasureName=TCPInAll
X=5
Y=15r
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
AutoScale=1
Text="DL: %1b"

[Net.TotalOut]
Meter=STRING
MeasureName=TCPOutAll
X=110
Y=0r
FontColor=#fontColor.Text#
FontSize=#FontHeight#
FontFace=#FontName#
AntiAlias=1
AutoScale=1
Text="UL: %1b"
